<!DOCTYPE html>
<html>
<head>
  <title>CPU Scheduling Simulator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>CPU Scheduling Simulator</h1>

<div class="card">
  <input type="number" id="arrival" placeholder="Arrival Time">
  <input type="number" id="burst" placeholder="Burst Time">
  <button onclick="addProcess()">Add Process</button>
</div>

<div class="card">
  <select id="algorithm">
    <option value="rr">Round Robin</option>
    <option value="fcfs">FCFS</option>
  </select>

  <input type="number" id="quantum" placeholder="Time Quantum (RR only)">
  <button onclick="runSimulation()">Run</button>
</div>

<h3>Process Table</h3>
<table id="processTable"></table>

<h3>Gantt Chart</h3>
<div id="gantt"></div>
<div id="timeline"></div>

<h3>Results</h3>
<div id="results"></div>

<script src="script.js"></script>
</body>
</html>
